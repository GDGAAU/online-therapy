version: "3.9"

services:
  # ─── PostgreSQL Database ────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: online_therapy
      POSTGRES_USER: ${POSTGRES_USER:-therapy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-therapy_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-therapy_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-therapy_user}:${POSTGRES_PASSWORD:-therapy_pass}@db:5432/online_therapy
    ports:
      - "8000:8000"
    volumes:
      - ./back-end:/app
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ─── SvelteKit Frontend ─────────────────────────────────────
  frontend:
    build:
      context: ./front-end
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./front-end:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      PUBLIC_API_URL: http://backend:8000/api

volumes:
  postgres_data:
