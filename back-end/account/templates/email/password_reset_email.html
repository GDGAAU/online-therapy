<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Your Password</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f9f9f9; color: #333; }
    .container { max-width: 600px; margin: 40px auto; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    .button { background-color: #1a73e8; color: #fff; padding: 12px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin: 20px 0; }
    .footer { font-size: 12px; color: #888; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Password Reset Requested</h2>
    <p>Click the button below to reset your password:</p>
    <a href="{{ url }}" class="button">Reset Password</a>
    <p>If the button doesn't work, copy and paste the following link into your browser:</p>
    <p><a href="{{ url }}">{{ url }}</a></p>
    <div class="footer">
      <p>If you did not request a password reset, you can ignore this email.</p>
      <p>Online Therapy Team</p>
    </div>
  </div>
</body>
</html>
